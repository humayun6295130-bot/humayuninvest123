# Deploys Firestore rules + indexes to Firebase when those files change.
# Optional: add repo secret FIREBASE_TOKEN (local: npx firebase-tools login:ci)
# If FIREBASE_TOKEN is missing, this workflow skips deploy and still passes (no red X on PRs).
name: Deploy Firestore

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Firestore rules & indexes
    if: ${{ secrets.FIREBASE_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.12.0

      - name: Deploy Firestore (rules + indexes)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only firestore --non-interactive

  # Always succeeds; explains why the deploy job did not run.
  firestore-deploy-skipped:
    name: Firestore deploy skipped (no FIREBASE_TOKEN)
    if: ${{ secrets.FIREBASE_TOKEN == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "::notice::Repository secret FIREBASE_TOKEN is not set — automatic Firestore deploy was skipped."
          echo "Rules and indexes are still in the repo; deploy manually: firebase deploy --only firestore"
          echo "Or add FIREBASE_TOKEN (see docs/firebase-ci-setup.txt)."
