# Deploys Firestore rules + indexes to Firebase when those files change.
# One-time: add repo secret FIREBASE_TOKEN (run locally: npx firebase-tools login:ci)
name: Deploy Firestore

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.12.0

      - name: Deploy Firestore (rules + indexes)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::Add GitHub Actions secret FIREBASE_TOKEN (one-time: run npx firebase-tools login:ci locally, then paste in repo Settings → Secrets). See docs/firebase-ci-setup.txt"
            exit 1
          fi
          firebase deploy --only firestore --non-interactive
