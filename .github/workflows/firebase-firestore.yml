# Deploys Firestore rules + indexes when these files change on main.
# Secret FIREBASE_TOKEN: npx firebase-tools login:ci
# One job always runs (avoids GitHub "No jobs were run" when secret if-expressions skip all jobs).
name: Deploy Firestore

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-firestore.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Firestore rules & indexes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Deploy Firestore (or skip if no token)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -e
          if [ -z "${FIREBASE_TOKEN}" ]; then
            echo "::notice::FIREBASE_TOKEN is empty — skipped firebase deploy. Rules still apply if you published them in Firebase Console."
            exit 0
          fi
          npm install -g firebase-tools@15.12.0
          firebase deploy --only firestore --non-interactive
